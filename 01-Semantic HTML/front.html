<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- ✅ CORRECT - Semantic -->
    <header>
        <nav aria-label="Main navigation">
            <a href="/">Home</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <!-- Article Structure -->
    <article>
        <header>
            <h1>Article Title</h1>
            <time datetime="2026-05-06">June 05, 2026</time>
            <address>By <a href="mailto:mariusdakid@gmail.com">Author Name</a></address>
        </header>
        <section>
            <h2>Introduction</h2>
            <p>content...</p>
        </section>
        <aside>
            <h3>Related Links</h3>
            <ul>
                <li><a href="#">Link 1</a></li>
                <li><a href="#">Link 2</a></li>
            </ul>
        </aside>
        <footer>
            <p>Article footer information</p>
        </footer>
    </article>

    <!-- Form with Accessibility -->
    <form>
        <fieldset>
            <legend>Contact Informatiom</legend>
            <label for="email">Email: <abbr title="required">*</abbr></label>
            <input type="email" name="email" id="email" required aria-required="true" aria-describedby="email-help" />
            <small id="email-help">We'll never share your email.</small>

            <label for="country">Country:</label>
            <select name="country" id="country">
                <option value="">Select a country</option>
                <option value="us">United States</option>
                <option value="ca">Canada</option>
            </select>

            <fieldset>
                <legend>What are you interested in?</legend>
                <label>
                    <input type="checkbox" name="interests" value="web">
                    Web Development
                </label>
                <label>
                    <input type="checkbox" name="design" value="design">
                    Design
                </label>
            </fieldset>

            <button type="submit">Submit</button>
            <button type="reset">reset</button>
            <button type="reset">Clear</button>
        </fieldset>
    </form>

</body>

</html>
