<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Portfolio Page</title>
</head>

<body>
    <header>
        <nav aria-label="Main navigation">
            <h2>Ndifor Marius</h2>
            <a href="/">Home</a>
            <a href="/">Contact</a>
            <a href="/">About</a>
        </nav>
    </header>
    <section>
        <figure>
            <img src="images/marius.jpeg" width="300px" height="250px" alt="profile image" />
            <figcaption>software engineer</figcaption>
        </figure>
        <h1>Frontend Developer</h1>

        <p>Aspiring forntend developer. Looking for improving and poilshing my skills.</p>
    </section>
    <aside>
        <h3>Project Links</h3>
        <ul>
            <li>Note App</li>
            <li>Filtering App</li>
        </ul>
    </aside>

    <form>
        <fieldset>
            <legend>Contact Me</legend>
            <label for="email">Email:<abbr title="required">*</abbr></label>
            <input type="email" name="email" id="email"><br>
            <label for="message">Message:</label>
            <textarea name="message" id="message"></textarea>
            <fieldset>
                <legend>What are you interested In?</legend>
                <label>
                    <input type="checkbox" name="interests" id="interests" value="web">
                    <label for="interests">Web Development</label>
                </label>
                <label>
                    <input type="checkbox" name="design" id="design" value="design">
                    <label for="design">Design</label>
                </label>
            </fieldset>
            <button type="submit">Submit</button>
        </fieldset>

    </form>
    <hr>
    <footer>
        <p>Ndifor Marius 2026 &copy; All Rights Reserved.</p>
    </footer>
</body>

</html>
